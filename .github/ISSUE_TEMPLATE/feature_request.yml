name: Feature request
description: Suggest an idea or improvement for LabCheck
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve? What's the use case?
      placeholder: As an instructor, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      description: LabCheck is a client-only, offline-first PWA with no backend.
      options:
        - label: This feature can work without a backend (data stays on-device)
          required: false
